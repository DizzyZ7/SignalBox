services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - signalbox_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    image: ghcr.io/dizzyz7/signalbox:${SIGNALBOX_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      ADMIN_API_KEY: ${ADMIN_API_KEY:?ADMIN_API_KEY is required}
      AUTO_MIGRATE: ${AUTO_MIGRATE:-true}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_DEFAULT_CHAT_ID: ${TELEGRAM_DEFAULT_CHAT_ID:-}
      MAX_BODY_BYTES: ${MAX_BODY_BYTES:-1048576}
      WEBHOOK_RATE_LIMIT_REQUESTS: ${WEBHOOK_RATE_LIMIT_REQUESTS:-120}
      WEBHOOK_RATE_LIMIT_WINDOW: ${WEBHOOK_RATE_LIMIT_WINDOW:-1m}
      DELIVERY_WORKER_ENABLED: ${DELIVERY_WORKER_ENABLED:-true}
      DELIVERY_WORKER_INTERVAL: ${DELIVERY_WORKER_INTERVAL:-5s}
      DELIVERY_WORKER_BATCH_SIZE: ${DELIVERY_WORKER_BATCH_SIZE:-10}
      DELIVERY_WORKER_LOCK_DURATION: ${DELIVERY_WORKER_LOCK_DURATION:-1m}
      DELIVERY_MAX_ATTEMPTS: ${DELIVERY_MAX_ATTEMPTS:-8}
    ports:
      - "127.0.0.1:${SIGNALBOX_HOST_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/readyz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  signalbox_pgdata:
