name: format-fix-once

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    if: github.actor == 'DizzyZ7' || github.actor == 'web-flow'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: false

      - name: Format server and remove this workflow
        run: |
          gofmt -w internal/httpapi/server.go
          rm -f .github/workflows/format-fix-once.yml

      - name: Commit formatting fix
        run: |
          if git diff --quiet; then
            echo "No formatting changes needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add internal/httpapi/server.go .github/workflows/format-fix-once.yml
          git commit -m "Format server admin audit wiring"
          git push
